name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  perf-memory-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type != 'Bot'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            이 저장소는 React 19 + TypeScript + Vite + Emotion + TanStack Query +
            React Router 7 + Axios + MSW 기반의 guiderun-front-v2 프로젝트입니다.
            PR #${{ github.event.pull_request.number }} 를 **잠재적 메모리/성능
            관점에서만** 리뷰하세요. 일반 코드 스타일 리뷰는 생략합니다.

            ## 작업 절차
            1. `gh pr diff ${{ github.event.pull_request.number }}` 로 변경 파일과
               컨텍스트 확인. 필요 시 Read 로 주변 코드까지 확인 (변경 라인만 보면
               안 됨)
            2. 아래 4개 카테고리에서만 의심 지점을 도출
            3. 각 이슈는 `gh pr comment` 로 한 번에 정리해서 코멘트로 남길 것
               (또는 inline 가능한 경우 `gh api` 로 review comment)
            4. 마지막에 한 줄 요약 (🟢 No issues / 🟡 Minor / 🔴 Needs attention)

            ## 리뷰 카테고리
            ### 1. React 렌더링 이슈
            - props/state 가 매 렌더마다 새 참조로 만들어져서 자식이 불필요하게
              리렌더되는 경우 (특히 객체/배열/함수 prop)
            - 누락된 `useMemo` / `useCallback` 중 *측정 가능한 비용*이 있는 곳만
              (지나친 메모이제이션 권장 금지)
            - `useEffect` 의존성 누락/과다, effect 안에서 setState 로 인한 무한 루프
            - 리스트의 unstable `key` (index key, 랜덤 key)
            - context value 가 매 렌더마다 새 객체

            ### 2. 메모리 누수
            - `addEventListener`, `IntersectionObserver`, `ResizeObserver`,
              `MutationObserver` cleanup 누락
            - `setInterval` / `setTimeout` / `requestAnimationFrame` cleanup 누락
            - `AbortController` 미사용으로 인한 fetch/axios 응답이 unmount 후
              setState
            - TanStack Query `useQuery` 의 `enabled`, `staleTime`, `gcTime`
              설정 오용
            - 클로저에 큰 객체를 잡고 있는 경우

            ### 3. 번들/네트워크
            - 사이드이펙트가 있는 모듈을 top-level import (트리쉐이킹 방해)
            - 큰 라이브러리 전체 import (예: `import _ from 'lodash'`) 대신
              named import 가능한 경우
            - `React.lazy` 로 분리 가능한 라우트인데 동기 import
            - 같은 endpoint 를 useEffect 들이 중복 호출
            - React Query 사용 가능한 곳에 직접 axios + useEffect
            - 이미지/asset 최적화 누락

            ### 4. Emotion / 스타일 비용
            - 컴포넌트 함수 *내부*에서 `styled(...)` 호출 (매 렌더마다 새 컴포넌트
              클래스 생성)
            - props 로 받은 값을 매번 새 스타일 객체로 전달 (`css={{...}}` 인라인)
            - 동적 스타일에서 매번 새 `keyframes` 생성

            ## 코멘트 포맷 (한국어)
            각 이슈는 다음 포맷:
            ```
            ### 🔴/🟡 [카테고리] 한 줄 제목
            **위치**: `src/path/file.tsx:42`
            **현상**: 무엇이 문제인지
            **영향**: 어떤 시나리오에서 비용이 발생하는지
            **제안**: 구체적 수정 방향 (코드 스니펫 권장)
            ```

            ## 규칙
            - 4개 카테고리에 해당하지 않으면 언급하지 말 것
            - "혹시 모를"·"이론적"·"잠재적으로 가능" 같은 추측성 지적 금지.
              실제 비용/누수가 발생하는 경로가 설명 가능한 것만
            - PR 가 매우 작거나 위 항목이 없으면 `🟢 메모리·성능 관점 이슈 없음`
              한 줄만 코멘트
            - 시간 추정치/칭찬 멘트 금지
          claude_args: |
            --model claude-opus-4-6
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(git log:*),Bash(git diff:*),Read,Grep,Glob"
