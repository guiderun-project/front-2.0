<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <script>
      try {
        const COLOR_MODE_STORAGE_KEY = "guiderun-color-mode";
        const COLOR_MODE = {
          LIGHT: "light",
          DARK: "dark",
        };
        const colorMode = window.localStorage.getItem(COLOR_MODE_STORAGE_KEY);

        if (colorMode === COLOR_MODE.LIGHT || colorMode === COLOR_MODE.DARK) {
          document.documentElement.dataset.colorMode = colorMode;
        }
      } catch {
        // Keep the system color-scheme fallback when storage is unavailable.
      }
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="preload"
      href="/fonts/pretendard/PretendardVariable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/april16th/April16th-Promise.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>가이드런프로젝트</title>
    <meta name="description" content="함께 달려요!" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="가이드런프로젝트" />
    <meta property="og:description" content="함께 달려요!" />
    <meta property="og:image" content="/og-image.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
